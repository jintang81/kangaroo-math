<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Pink background circle -->
  <circle cx="96" cy="96" r="96" fill="#FF69B4"/>
  <!-- Lighter pink inner circle -->
  <circle cx="96" cy="96" r="84" fill="#FFB6C1"/>

  <!-- Kangaroo tail -->
  <ellipse cx="50" cy="148" rx="12" ry="36" fill="#D4855A" transform="rotate(-25 50 148)"/>

  <!-- Kangaroo body -->
  <ellipse cx="96" cy="130" rx="38" ry="48" fill="#E8A87C"/>

  <!-- Kangaroo neck -->
  <ellipse cx="112" cy="92" rx="16" ry="22" fill="#E8A87C"/>

  <!-- Kangaroo head -->
  <ellipse cx="120" cy="68" rx="26" ry="22" fill="#E8A87C"/>

  <!-- Snout -->
  <ellipse cx="136" cy="78" rx="14" ry="10" fill="#D4855A"/>

  <!-- Left ear -->
  <ellipse cx="107" cy="48" rx="8" ry="18" fill="#E8A87C"/>
  <ellipse cx="107" cy="49" rx="4" ry="13" fill="#F4C8A8"/>

  <!-- Right ear -->
  <ellipse cx="128" cy="44" rx="8" ry="18" fill="#E8A87C"/>
  <ellipse cx="128" cy="45" rx="4" ry="13" fill="#F4C8A8"/>

  <!-- Eyes -->
  <circle cx="114" cy="64" r="7" fill="white"/>
  <circle cx="127" cy="62" r="7" fill="white"/>
  <circle cx="115" cy="65" r="4" fill="#333"/>
  <circle cx="128" cy="63" r="4" fill="#333"/>
  <circle cx="116" cy="63" r="1.5" fill="white"/>
  <circle cx="129" cy="61" r="1.5" fill="white"/>

  <!-- Nose -->
  <ellipse cx="138" cy="76" rx="4" ry="3" fill="#C06080"/>

  <!-- Smile -->
  <path d="M 128 82 Q 136 88 144 82" stroke="#C06080" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Pouch -->
  <ellipse cx="84" cy="138" rx="22" ry="16" fill="#D4855A"/>

  <!-- Front arm -->
  <ellipse cx="68" cy="112" rx="10" ry="22" fill="#E8A87C" transform="rotate(-20 68 112)"/>

  <!-- Hind legs -->
  <ellipse cx="72" cy="165" rx="12" ry="24" fill="#E8A87C" transform="rotate(12 72 165)"/>
  <ellipse cx="106" cy="168" rx="12" ry="24" fill="#E8A87C" transform="rotate(-8 106 168)"/>

  <!-- Stars decoration -->
  <text x="30" y="56" font-size="20" fill="white" opacity="0.9">⭐</text>
  <text x="148" y="42" font-size="14" fill="white" opacity="0.8">✨</text>
</svg>
