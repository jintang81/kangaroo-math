<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Pink background circle -->
  <circle cx="256" cy="256" r="256" fill="#FF69B4"/>
  <circle cx="256" cy="256" r="224" fill="#FFB6C1"/>

  <!-- Kangaroo tail -->
  <ellipse cx="130" cy="390" rx="32" ry="96" fill="#D4855A" transform="rotate(-25 130 390)"/>

  <!-- Kangaroo body -->
  <ellipse cx="256" cy="348" rx="100" ry="128" fill="#E8A87C"/>

  <!-- Kangaroo neck -->
  <ellipse cx="298" cy="248" rx="42" ry="58" fill="#E8A87C"/>

  <!-- Kangaroo head -->
  <ellipse cx="320" cy="184" rx="70" ry="58" fill="#E8A87C"/>

  <!-- Snout -->
  <ellipse cx="364" cy="208" rx="36" ry="26" fill="#D4855A"/>

  <!-- Left ear -->
  <ellipse cx="286" cy="128" rx="22" ry="48" fill="#E8A87C"/>
  <ellipse cx="286" cy="130" rx="12" ry="34" fill="#F4C8A8"/>

  <!-- Right ear -->
  <ellipse cx="342" cy="116" rx="22" ry="48" fill="#E8A87C"/>
  <ellipse cx="342" cy="118" rx="12" ry="34" fill="#F4C8A8"/>

  <!-- Eyes -->
  <circle cx="305" cy="170" r="18" fill="white"/>
  <circle cx="338" cy="164" r="18" fill="white"/>
  <circle cx="308" cy="172" r="10" fill="#333"/>
  <circle cx="341" cy="166" r="10" fill="#333"/>
  <circle cx="311" cy="168" r="4" fill="white"/>
  <circle cx="344" cy="162" r="4" fill="white"/>

  <!-- Nose -->
  <ellipse cx="370" cy="204" rx="10" ry="8" fill="#C06080"/>

  <!-- Smile -->
  <path d="M 346 220 Q 364 236 382 220" stroke="#C06080" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Pouch -->
  <ellipse cx="224" cy="368" rx="58" ry="42" fill="#D4855A"/>

  <!-- Front arm -->
  <ellipse cx="180" cy="298" rx="26" ry="58" fill="#E8A87C" transform="rotate(-20 180 298)"/>

  <!-- Hind legs -->
  <ellipse cx="192" cy="440" rx="32" ry="64" fill="#E8A87C" transform="rotate(12 192 440)"/>
  <ellipse cx="284" cy="448" rx="32" ry="64" fill="#E8A87C" transform="rotate(-8 284 448)"/>

  <!-- Stars decoration -->
  <text x="72" y="148" font-size="56" fill="white" opacity="0.9">⭐</text>
  <text x="392" y="112" font-size="40" fill="white" opacity="0.8">✨</text>
  <text x="60" y="320" font-size="32" fill="white" opacity="0.6">♥</text>
</svg>
